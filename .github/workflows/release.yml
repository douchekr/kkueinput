name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: amd64
            cc: gcc
            pkg_config: pkg-config
            suffix: x86_64
          - arch: arm64
            cc: aarch64-linux-gnu-gcc
            pkg_config: aarch64-linux-gnu-pkg-config
            suffix: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (amd64)
        if: matrix.arch == 'amd64'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Install dependencies (arm64 cross)
        if: matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libgtk-3-dev:arm64

      - name: Build
        env:
          CC: ${{ matrix.cc }}
          PKG_CONFIG: ${{ matrix.pkg_config }}
        run: |
          $CC -Wall -Wextra -O2 \
            $($PKG_CONFIG --cflags gtk+-3.0) \
            -o kkueinput-${{ matrix.suffix }} \
            kkueinput.c \
            $($PKG_CONFIG --libs gtk+-3.0)

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: kkueinput-${{ matrix.suffix }}
